# GoReleaser configuration
# https://goreleaser.com

version: 2

before:
  hooks:
    # Ensure dependencies are up to date
    - go mod tidy

builds:
  - id: jk
    binary: jk
    main: ./cmd/jk
    env:
      - CGO_ENABLED={{- if eq .Os "darwin" }}1{{- else }}0{{- end }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # Ignore specific combinations
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X github.com/avivsinai/jenkins-cli/internal/build.versionFromLdflags={{.Version}}
      - -X github.com/avivsinai/jenkins-cli/internal/build.commitFromLdflags={{.Commit}}
      - -X github.com/avivsinai/jenkins-cli/internal/build.dateFromLdflags={{.Date}}
    flags:
      - -trimpath
    hooks:
      post:
        - ./scripts/sign-darwin-binary.sh "{{ .Path }}" "{{ .Os }}"

archives:
  - id: jk-archive
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  name_template: "{{ incpatch .Version }}-next+{{ .ShortCommit }}"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge remote-tracking branch
      - Merge branch
  groups:
    - title: '🚀 Features'
      regexp: '^feat(\(.+\))?:'
      order: 0
    - title: '🐛 Bug Fixes'
      regexp: '^fix(\(.+\))?:'
      order: 1
    - title: '📦 Dependencies'
      regexp: '^deps(\(.+\))?:'
      order: 2
    - title: '🔧 Other Changes'
      order: 999

release:
  github:
    owner: avivsinai
    name: jenkins-cli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## jk {{ .Tag }} ({{ .Date }})

    Welcome to this new release of `jk`!
  footer: |
    ---

    **Full Changelog**: https://github.com/avivsinai/jenkins-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Installation

    ### Homebrew (macOS/Linux)
    ```bash
    brew install avivsinai/tap/jk
    ```

    ### Scoop (Windows)
    ```powershell
    scoop bucket add avivsinai https://github.com/avivsinai/scoop-bucket
    scoop install jk
    ```

    ### Go Install
    ```bash
    go install github.com/avivsinai/jenkins-cli/cmd/jk@{{ .Tag }}
    ```

    ### Binary Downloads
    Download the appropriate binary for your platform from the assets below.

brews:
  - name: jk
    repository:
      owner: avivsinai
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: https://github.com/avivsinai/jenkins-cli
    description: "CLI for Jenkins - GitHub CLI-style workflows for Jenkins controllers"
    license: MIT
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
    install: |
      bin.install "jk"
    test: |
      system "#{bin}/jk", "version"

scoops:
  - name: jk
    repository:
      owner: avivsinai
      name: scoop-bucket
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: bucket
    homepage: https://github.com/avivsinai/jenkins-cli
    description: "CLI for Jenkins - GitHub CLI-style workflows for Jenkins controllers"
    license: MIT
    commit_author:
      name: github-actions[bot]
      email: github-actions[bot]@users.noreply.github.com
